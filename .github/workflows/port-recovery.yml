# Убедитесь, что директория существует
mkdir -p .github/workflows

# Создайте/перезапишите файл workflow
cat > .github/workflows/port_custom_recovery.yml << 'YAMLEOF'
name: Port Custom Recovery

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  port-recovery:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup environment
        run: |
          sudo apt-get update
          # Устанавливаем инструменты для сборки
          sudo apt-get install -y build-essential git wget unzip
          
          # Клонируем и собираем mkbootimg из исходников AOSP
          echo "Building mkbootimg from AOSP source..."
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg --depth=1 /tmp/mkbootimg
          cd /tmp/mkbootimg
          make
          sudo cp mkbootimg /usr/local/bin/
          sudo cp unpack_bootimg /usr/local/bin/
          cd /
          rm -rf /tmp/mkbootimg
          
          # Проверяем, что инструменты установлены
          echo "Checking installed tools:"
          which mkbootimg
          which unpack_bootimg
          
          # Создаем необходимые директории
          mkdir -p output

      - name: Extract recovery from source boot image
        run: |
          # Проверяем наличие скрипта
          if [ ! -f "scripts/extract_recovery.sh" ]; then
            echo "ERROR: scripts/extract_recovery.sh not found!"
            echo "Creating minimal script for testing..."
            mkdir -p scripts
            cat > scripts/extract_recovery.sh << 'SCRIPTEOF'
#!/bin/bash
echo "=== Extract Recovery Script ==="
echo "Source boot image: $1"

if [ ! -f "$1" ]; then
    echo "ERROR: Source boot image not found: $1"
    exit 1
fi

# Здесь должна быть ваша логика извлечения recovery
echo "Extracting recovery from $1..."
# Пример использования unpack_bootimg (если нужно)
# unpack_bootimg -i "$1" -o output/extracted/

echo "Extraction complete!"
SCRIPTEOF
            chmod +x scripts/extract_recovery.sh
          fi
          
          chmod +x scripts/extract_recovery.sh
          ./scripts/extract_recovery.sh boot_images/source/boot.img

      - name: Inject recovery into target boot image
        run: |
          # Проверяем наличие скрипта
          if [ ! -f "scripts/inject_recovery.sh" ]; then
            echo "ERROR: scripts/inject_recovery.sh not found!"
            echo "Creating minimal script for testing..."
            cat > scripts/inject_recovery.sh << 'SCRIPTEOF'
#!/bin/bash
echo "=== Inject Recovery Script ==="
echo "Target boot image: $1"
echo "Recovery image: $2"
echo "Output boot image: $3"

if [ ! -f "$1" ]; then
    echo "ERROR: Target boot image not found: $1"
    exit 1
fi

# Здесь должна быть ваша логика инжектирования recovery
echo "Injecting recovery into $1..."
echo "Output will be saved to $3"

SCRIPTEOF
            chmod +x scripts/inject_recovery.sh
          fi
          
          chmod +x scripts/inject_recovery.sh
          ./scripts/inject_recovery.sh \
            boot_images/target/boot.img \
            output/recovery.img \
            output/new_boot.img

      - name: Upload ported boot image
        uses: actions/upload-artifact@v4
        with:
          name: ported-boot-image
          path: output/new_boot.img
          retention-days: 7

      - name: Create release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: output/new_boot.img
          tag: v${{ github.run_number }}
          name: "Ported Boot Image v${{ github.run_number }}"
YAMLEOF

# Закоммитьте и отправьте
git add .github/workflows/port_custom_recovery.yml
git commit -m "Fix: Replace mkbootimg pip with AOSP source build"
git push origin main
