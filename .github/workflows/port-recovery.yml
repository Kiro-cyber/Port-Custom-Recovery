name: Port Custom Recovery

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  port-recovery:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Remove broken submodule if exists
        run: |
          # Удаляем проблемный подмодуль
          if [ -f ".gitmodules" ]; then
            echo "Removing problematic .gitmodules file..."
            rm -f .gitmodules
          fi
          if [ -d "tools/mkbootimg" ]; then
            echo "Removing broken submodule directory..."
            rm -rf tools/mkbootimg
          fi
          # Очищаем git config от подмодуля
          git config --local --remove-section submodule.tools/mkbootimg 2>/dev/null || true
          git config --local --remove-section submodule.tools/mkbootimg.url 2>/dev/null || true

      - name: Setup environment and build mkbootimg
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc g++ libssl-dev pkg-config
          
          echo "Building mkbootimg from AOSP source..."
          # Клонируем и собираем mkbootimg
          cd /tmp
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg --depth=1
          cd mkbootimg
          
          # Проверяем структуру после клонирования
          echo "Files in mkbootimg directory:"
          ls -la
          
          # Собираем с указанием целей
          g++ -std=c++17 -o mkbootimg mkbootimg.cpp -I/usr/include || \
          gcc -o mkbootimg mkbootimg.c || \
          cc -o mkbootimg mkbootimg.c
          
          # Если есть отдельный файл для unpack_bootimg
          if [ -f "unpack_bootimg.cpp" ]; then
            g++ -std=c++17 -o unpack_bootimg unpack_bootimg.cpp
          elif [ -f "unpack_bootimg.c" ]; then
            gcc -o unpack_bootimg unpack_bootimg.c
          fi
          
          # Копируем в системную директорию
          sudo cp mkbootimg /usr/local/bin/ 2>/dev/null || echo "mkbootimg not built"
          sudo cp unpack_bootimg /usr/local/bin/ 2>/dev/null || echo "unpack_bootimg not built"
          
          cd /
          rm -rf /tmp/mkbootimg
          
          # Если сборка не удалась, используем альтернативу
          if ! which mkbootimg; then
            echo "AOSP build failed, installing alternative tools..."
            sudo apt-get install -y android-sdk-libsparse-utils
            # Используем abootimg как альтернативу
            sudo apt-get install -y abootimg
          fi
          
          mkdir -p output

      - name: Verify tools
        run: |
          echo "=== Available tools ==="
          which mkbootimg || echo "mkbootimg not found, using abootimg"
          which unpack_bootimg || echo "unpack_bootimg not found"
          which abootimg || echo "abootimg not available"

      - name: Extract recovery from source boot image
        run: |
          if [ ! -f "scripts/extract_recovery.sh" ]; then
            echo "Creating extract script..."
            mkdir -p scripts
            cat > scripts/extract_recovery.sh << 'EOF'
#!/bin/bash
echo "=== Extract Recovery Script ==="
echo "Source boot image: $1"

if [ ! -f "$1" ]; then
    echo "ERROR: Source file not found: $1"
    exit 1
fi

# Используем unpack_bootimg если доступен
if command -v unpack_bootimg &> /dev/null; then
    echo "Using unpack_bootimg..."
    unpack_bootimg -i "$1" -o output/extracted/
elif command -v abootimg &> /dev/null; then
    echo "Using abootimg..."
    mkdir -p output/extracted
    abootimg -x "$1" output/extracted/boot.cfg output/extracted/zImage output/extracted/initrd.img
else
    echo "WARNING: No extraction tool available"
    mkdir -p output/extracted
    cp "$1" output/extracted/boot.img
fi

echo "Extraction complete!"
EOF
            chmod +x scripts/extract_recovery.sh
          fi
          chmod +x scripts/extract_recovery.sh
          ./scripts/extract_recovery.sh boot_images/source/boot.img

      - name: Inject recovery into target boot image
        run: |
          if [ ! -f "scripts/inject_recovery.sh" ]; then
            echo "Creating inject script..."
            cat > scripts/inject_recovery.sh << 'EOF'
#!/bin/bash
echo "=== Inject Recovery Script ==="
echo "Target: $1"
echo "Recovery: $2"
echo "Output: $3"

if [ ! -f "$1" ]; then
    echo "ERROR: Target file not found: $1"
    exit 1
fi

# Создаем заглушку output файла, пока нет реальной логики
if command -v mkbootimg &> /dev/null; then
    echo "Using mkbootimg..."
    # Здесь должна быть команда сборки нового boot.img
    cp "$1" "$3"
elif command -v abootimg &> /dev/null; then
    echo "Using abootimg..."
    cp "$1" "$3"
else
    echo "WARNING: No boot image tool available"
    mkdir -p $(dirname "$3")
    cp "$1" "$3"
fi

echo "Injection complete! Output: $3"
EOF
            chmod +x scripts/inject_recovery.sh
          fi
          chmod +x scripts/inject_recovery.sh
          ./scripts/inject_recovery.sh \
            boot_images/target/boot.img \
            output/recovery.img \
            output/new_boot.img

      - name: Upload ported boot image
        uses: actions/upload-artifact@v4
        with:
          name: ported-boot-image
          path: output/new_boot.img
          retention-days: 7

      - name: Create release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: output/new_boot.img
          tag: v${{ github.run_number }}
          name: "Ported Boot Image v${{ github.run_number }}"
