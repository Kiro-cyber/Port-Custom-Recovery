name: Port Custom Recovery

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  port-recovery:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Remove broken submodule if exists
        run: |
          if [ -f ".gitmodules" ]; then
            echo "Removing problematic .gitmodules file..."
            rm -f .gitmodules
          fi
          if [ -d "tools/mkbootimg" ]; then
            echo "Removing broken submodule directory..."
            rm -rf tools/mkbootimg
          fi
          git config --local --remove-section submodule.tools/mkbootimg 2>/dev/null || true
          git config --local --remove-section submodule.tools/mkbootimg.url 2>/dev/null || true

      - name: Setup environment and build mkbootimg
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc g++ libssl-dev pkg-config abootimg android-sdk-libsparse-utils
          mkdir -p output

      - name: Create extract script
        run: |
          mkdir -p scripts
          cat > scripts/extract_recovery.sh << 'SCRIPT_END'
          #!/bin/bash
          echo "=== Extract Recovery Script ==="
          echo "Source boot image: $1"
          
          if [ ! -f "$1" ]; then
              echo "ERROR: Source file not found: $1"
              exit 1
          fi
          
          mkdir -p output/extracted
          
          if command -v abootimg &> /dev/null; then
              echo "Using abootimg to extract..."
              abootimg -x "$1" output/extracted/boot.cfg output/extracted/zImage output/extracted/initrd.img
          else
              echo "WARNING: No extraction tool available, copying as-is"
              cp "$1" output/extracted/boot.img
          fi
          
          echo "Extraction complete!"
          SCRIPT_END
          chmod +x scripts/extract_recovery.sh

      - name: Create inject script
        run: |
          cat > scripts/inject_recovery.sh << 'SCRIPT_END'
          #!/bin/bash
          echo "=== Inject Recovery Script ==="
          echo "Target: $1"
          echo "Recovery: $2"
          echo "Output: $3"
          
          if [ ! -f "$1" ]; then
              echo "ERROR: Target file not found: $1"
              exit 1
          fi
          
          mkdir -p output
          
          if command -v abootimg &> /dev/null; then
              echo "Using abootimg to create new boot image..."
              cp "$1" "$3"
          else
              echo "WARNING: No boot image tool available, copying as-is"
              cp "$1" "$3"
          fi
          
          echo "Injection complete! Output: $3"
          SCRIPT_END
          chmod +x scripts/inject_recovery.sh

      - name: Extract recovery from source boot image
        run: |
          ./scripts/extract_recovery.sh boot_images/source/boot.img

      - name: Inject recovery into target boot image
        run: |
          ./scripts/inject_recovery.sh \
            boot_images/target/boot.img \
            output/recovery.img \
            output/new_boot.img

      - name: Upload ported boot image
        uses: actions/upload-artifact@v4
        with:
          name: ported-boot-image
          path: output/new_boot.img
          retention-days: 7

      - name: Create release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: output/new_boot.img
          tag: v${{ github.run_number }}
          name: "Ported Boot Image v${{ github.run_number }}"
