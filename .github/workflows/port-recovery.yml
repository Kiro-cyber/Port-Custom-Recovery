name: Port Custom Recovery

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  port-recovery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          # Устанавливаем инструменты для работы с Android образами
          sudo apt-get install -y android-sdk-libsparse-utils android-sdk-platform-tools-common
          # Скачиваем mkbootimg из репозитория AOSP
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg --depth=1
          cd mkbootimg
          # Компилируем и устанавливаем
          make
          sudo cp mkbootimg /usr/local/bin/
          sudo cp unpack_bootimg /usr/local/bin/
          cd ..
          rm -rf mkbootimg
          # Создаем папку output
          mkdir -p output

      - name: Extract recovery from source boot image
        run: |
          chmod +x scripts/extract_recovery.sh
          ./scripts/extract_recovery.sh boot_images/source/boot.img

      - name: Inject recovery into target boot image
        run: |
          chmod +x scripts/inject_recovery.sh
          ./scripts/inject_recovery.sh \
            boot_images/target/boot.img \
            output/recovery.img \
            output/new_boot.img

      - name: Upload ported boot image
        uses: actions/upload-artifact@v4
        with:
          name: ported-boot-image
          path: output/new_boot.img
          retention-days: 7

      - name: Create release (optional)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: output/new_boot.img
          tag: v${{ github.run_number }}
          name: "Ported Boot Image v${{ github.run_number }}"
