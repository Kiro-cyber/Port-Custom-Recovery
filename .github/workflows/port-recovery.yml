name: Port Custom Recovery

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  port-recovery:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget unzip
          
          echo "Building mkbootimg from AOSP source..."
          cd /tmp
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg --depth=1
          cd mkbootimg
          make
          sudo cp mkbootimg /usr/local/bin/
          sudo cp unpack_bootimg /usr/local/bin/
          cd /
          rm -rf /tmp/mkbootimg
          
          echo "Tools installed:"
          which mkbootimg
          which unpack_bootimg
          
          mkdir -p output

      - name: Check files structure
        run: |
          echo "=== Repository structure ==="
          ls -la
          echo ""
          echo "=== Checking for required files ==="
          if [ -f "boot_images/source/boot.img" ]; then
            echo "✓ Source boot image found"
          else
            echo "✗ Source boot image NOT found at boot_images/source/boot.img"
          fi
          
          if [ -f "boot_images/target/boot.img" ]; then
            echo "✓ Target boot image found"
          else
            echo "✗ Target boot image NOT found at boot_images/target/boot.img"
          fi
          
          if [ -f "scripts/extract_recovery.sh" ]; then
            echo "✓ Extract script found"
          else
            echo "✗ Extract script NOT found at scripts/extract_recovery.sh"
          fi
          
          if [ -f "scripts/inject_recovery.sh" ]; then
            echo "✓ Inject script found"
          else
            echo "✗ Inject script NOT found at scripts/inject_recovery.sh"
          fi

      - name: Extract recovery from source boot image
        run: |
          if [ ! -f "scripts/extract_recovery.sh" ]; then
            echo "Creating placeholder extract script..."
            mkdir -p scripts
            cat > scripts/extract_recovery.sh << 'EOF'
          #!/bin/bash
          echo "Extract recovery script"
          echo "Source: $1"
          if [ ! -f "$1" ]; then
            echo "ERROR: File not found: $1"
            exit 1
          fi
          echo "Extraction successful (placeholder)"
          EOF
            chmod +x scripts/extract_recovery.sh
          fi
          ./scripts/extract_recovery.sh boot_images/source/boot.img

      - name: Inject recovery into target boot image
        run: |
          if [ ! -f "scripts/inject_recovery.sh" ]; then
            echo "Creating placeholder inject script..."
            cat > scripts/inject_recovery.sh << 'EOF'
          #!/bin/bash
          echo "Inject recovery script"
          echo "Target: $1"
          echo "Recovery: $2"
          echo "Output: $3"
          if [ ! -f "$1" ]; then
            echo "ERROR: File not found: $1"
            exit 1
          fi
          echo "Injection successful (placeholder)"
          EOF
            chmod +x scripts/inject_recovery.sh
          fi
          ./scripts/inject_recovery.sh \
            boot_images/target/boot.img \
            output/recovery.img \
            output/new_boot.img

      - name: Upload ported boot image
        uses: actions/upload-artifact@v4
        with:
          name: ported-boot-image
          path: output/new_boot.img
          retention-days: 7

      - name: Create release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: output/new_boot.img
          tag: v${{ github.run_number }}
          name: "Ported Boot Image v${{ github.run_number }}"
